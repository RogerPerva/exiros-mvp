services:
  postgres:
    image: postgres:16-alpine
    container_name: exiros-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exiros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-exiros}
    volumes:
      - exiros_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exiros} -d ${POSTGRES_DB:-exiros}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: exiros-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-exiros}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-exiros}?schema=public
      APP_KEY: ${APP_KEY}
      TRIP_TOKEN_SECRET: ${TRIP_TOKEN_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      PORT: "3000"
      WEB_ORIGIN: ${WEB_ORIGIN}
      TRUST_PROXY_IP: ${TRUST_PROXY_IP:-true}
    volumes:
      - exiros_uploads:/app/uploads
    ports:
      - "3000:3000"

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: exiros-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: exiros-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    depends_on:
      - web
      - backend

volumes:
  exiros_pgdata:
  exiros_uploads:
